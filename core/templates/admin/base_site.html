{% extends "admin/base_site.html" %}

{% block extrahead %}
{{ block.super }}
<style>
    /* Remove black theme toggles */
    .theme-toggle {
        display: none !important;
    }
    #header .theme-toggle {
        display: none !important;
    }
    .theme-toggle-wrapper {
        display: none !important;
    }

    /* Clean header */
    #header {
        background: #1a3a5c !important;
        padding: 15px 20px !important;
    }
    #header h1 {
        color: white !important;
        font-size: 22px !important;
    }

    /* Forgot password link */
    .forgot-password-container {
        text-align: center;
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px solid #ddd;
    }
    .forgot-password-container a {
        color: #1a3a5c;
        text-decoration: none;
        font-weight: 500;
    }
    .forgot-password-container a:hover {
        text-decoration: underline;
    }

    /* Show password toggle */
    .show-password-container {
        text-align: left;
        margin-top: 8px;
    }
    .show-password-container input[type="checkbox"] {
        width: auto !important;
        margin-right: 5px !important;
        display: inline-block !important;
    }
    .show-password-container label {
        font-size: 14px;
        color: #555;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
{{ block.super }}

<!-- Forgot Password Link -->
<div class="forgot-password-container">
    <a href="/accounts/password_reset/">🔑 Forgot Password?</a>
</div>

<!-- Show Password Toggle -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    var pwd = document.getElementById('id_password');
    if (pwd) {
        var container = document.createElement('div');
        container.className = 'show-password-container';
        var checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.id = 'show-pwd';
        var label = document.createElement('label');
        label.htmlFor = 'show-pwd';
        label.textContent = '👁️ Show Password';
        container.appendChild(checkbox);
        container.appendChild(label);
        pwd.parentNode.insertBefore(container, pwd.nextSibling);
        checkbox.addEventListener('change', function() {
            pwd.type = this.checked ? 'text' : 'password';
        });
    }
});
</script>
{% endblock %}
