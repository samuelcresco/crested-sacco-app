<!DOCTYPE html>
<html>
<head><title>Set New Password</title></head>
<body style="font-family: Arial; background: #f4f4f4; display: flex; justify-content: center; padding-top: 50px;">
    <div style="background: white; padding: 30px; border-radius: 10px; width: 350px;">
        <h2>Set New Password</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="background: #1a3a5c; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%;">Reset Password</button>
        </form>
    </div>
</body>
</html>
