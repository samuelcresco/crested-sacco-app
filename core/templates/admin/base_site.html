
{% extends "admin/base_site.html" %}

{% block extrahead %}
{{ block.super }}
<style>
    .theme-toggle, #header .theme-toggle, .theme-toggle-wrapper {
        display: none !important;
    }
    #header {
        background: linear-gradient(135deg, #0d1b2a, #1a3a5c) !important;
        padding: 15px 30px !important;
    }
    #header h1 {
        color: white !important;
        font-size: 22px !important;
        font-weight: 600 !important;
    }
</style>
{% endblock %}

{% block content %}
{{ block.super }}
<div style="text-align: center; margin-top: 15px; padding-top: 10px; border-top: 1px solid #e9ecef;">
    <a href="/accounts/password_reset/" style="color: #1a3a5c; text-decoration: none; font-weight: 500;">
        🔑 Forgot Password?
    </a>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var pwd = document.getElementById('id_password');
        if (pwd) {
            var c = document.createElement('div');
            c.style.cssText = 'text-align: left; margin-top: 8px; margin-bottom: 10px;';
            var chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.id = 'show-pwd';
            chk.style.cssText = 'width: auto; margin-right: 5px; display: inline-block;';
            var lbl = document.createElement('label');
            lbl.htmlFor = 'show-pwd';
            lbl.textContent = '👁️ Show Password';
            lbl.style.cssText = 'font-size: 14px; color: #555; cursor: pointer;';
            c.appendChild(chk);
            c.appendChild(lbl);
            var parent = pwd.parentNode;
            var submitRow = parent.querySelector('.submit-row');
            if (submitRow) {
                parent.insertBefore(c, submitRow);
            } else {
                parent.appendChild(c);
            }
            chk.addEventListener('change', function() {
                pwd.type = this.checked ? 'text' : 'password';
            });
        }
    });
</script>
{% endblock %}
