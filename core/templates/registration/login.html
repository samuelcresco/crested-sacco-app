<!DOCTYPE html>
<html>
<head>
    <!-- THIS IS THE MAGIC LINE THAT MAKES IT FIT PHONES -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crested SS 2005 Class - Member Login</title>
    <style>
        /* RESET default margins */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px; /* This stops it from getting too wide on tablets */
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-box h1 {
            color: #1a3a5c;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .login-box .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .login-box input:focus {
            border-color: #1a3a5c;
            outline: none;
            box-shadow: 0 0 5px rgba(26, 58, 92, 0.3);
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #1a3a5c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .login-box button:hover {
            background: #2d6a9f;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
            text-align: left;
        }
        .links {
            margin-top: 20px;
            font-size: 14px;
        }
        .links a {
            color: #1a3a5c;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin: 5px 0;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🏦</div>
        <h1>Crested SS 2005 Class</h1>
        <p class="subtitle">Member Savings Portal</p>
        
        {% if form.errors %}
            <div class="error">
                ❌ Invalid username or password. Please try again.
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        
        <div class="links">
            <p><a href="{% url 'register' %}">Create an Account (Sign Up)</a></p>
            <p><a href="{% url 'custom_password_reset' %}">Forgot Password?</a></p>
        </div>
    </div>
</body>
</html>
