{% extends "admin/login.html" %}

{% block content %}
{{ block.super }}

<!-- Add Forgot Password link below the login form -->
<div style="text-align: center; margin-top: 15px;">
    <a href="/accounts/password_reset/" style="color: #1a3a5c; text-decoration: none; font-weight: 500;">
        Forgot Password?
    </a>
</div>

<script>
    // Add Show Password toggle
    document.addEventListener('DOMContentLoaded', function() {
        var passwordField = document.getElementById('id_password');
        if (passwordField) {
            var wrapper = passwordField.parentNode;
            var container = document.createElement('div');
            container.style.cssText = 'text-align: left; margin-top: 8px;';
            var checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = 'show-password';
            checkbox.style.cssText = 'width: auto; margin-right: 5px;';
            var label = document.createElement('label');
            label.htmlFor = 'show-password';
            label.textContent = 'Show Password';
            label.style.cssText = 'font-size: 14px; color: #555; cursor: pointer;';
            container.appendChild(checkbox);
            container.appendChild(label);
            wrapper.appendChild(container);
            checkbox.addEventListener('change', function() {
                passwordField.type = this.checked ? 'text' : 'password';
            });
        }
    });
</script>
{% endblock %}
