<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crested SS 2005 Class - Admin Login</title>
    <style>
        /* ===== RESET ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1b2a, #1a3a5c, #2d6a9f);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== HEADER ===== */
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .login-header h1 {
            color: #0d1b2a;
            font-size: 24px;
            font-weight: 700;
        }

        .login-header p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            border-color: #1a3a5c;
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(26, 58, 92, 0.15);
        }

        /* ===== SHOW PASSWORD ===== */
        .show-password-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .show-password-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1a3a5c;
        }

        .show-password-container label {
            font-size: 14px;
            color: #555;
            cursor: pointer;
            font-weight: 500;
        }

        /* ===== LOGIN BUTTON ===== */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0d1b2a, #1a3a5c);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 58, 92, 0.3);
        }

        /* ===== FORGOT PASSWORD ===== */
        .forgot-password {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
        }

        .forgot-password a {
            color: #1a3a5c;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #2d6a9f;
            text-decoration: underline;
        }

        /* ===== ERROR MESSAGES ===== */
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .login-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- HEADER -->
        <div class="login-header">
            <div class="logo">🏦</div>
            <h1>Crested SS 2005 Class</h1>
            <p>Administration Login</p>
        </div>

        <!-- ERROR MESSAGES -->
        {% if form.errors %}
            <div class="error-message">
                ❌ Invalid username or password. Please try again.
            </div>
        {% endif %}

        <!-- LOGIN FORM -->
        <form method="post" action="{% url 'admin:login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="Enter your password" required>

                <!-- Show Password Toggle -->
                <div class="show-password-container">
                    <input type="checkbox" id="showPasswordToggle" onclick="togglePassword()">
                    <label for="showPasswordToggle">👁️ Show Password</label>
                </div>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>

        <!-- FORGOT PASSWORD LINK -->
        <div class="forgot-password">
            <a href="/accounts/password_reset/">🔑 Forgot Password?</a>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        function togglePassword() {
            var passwordField = document.getElementById("id_password");
            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        }
    </script>

</body>
</html>
