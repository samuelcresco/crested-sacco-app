<!DOCTYPE html>
<html>
<head><title>Reset Password</title>
<style>
    body { font-family: Arial; background: linear-gradient(135deg, #1a3a5c, #2d6a9f); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: white; padding: 40px; border-radius: 15px; width: 350px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #1a3a5c; color: white; border: none; border-radius: 8px; cursor: pointer; }
    a { color: #1a3a5c; text-decoration: none; }
</style>
</head>
<body>
    <div class="box">
        <h1 style="color: #1a3a5c;">Reset Password</h1>
        <p>Enter your email address.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Send Reset Link</button>
        </form>
        <p><a href="{% url 'login' %}">Back to Login</a></p>
    </div>
</body>
</html>
