
{% extends "admin/login.html" %}

{% block extrahead %}
{{ block.super }}
<style>
    /* REMOVE THEME TOGGLES */
    .theme-toggle { display: none !important; }
    #header .theme-toggle { display: none !important; }
    .theme-toggle-wrapper { display: none !important; }
    
    /* HEADER */
    #header {
        background: linear-gradient(135deg, #0d1b2a, #1a3a5c) !important;
        padding: 15px 30px !important;
    }
    #header h1 {
        color: white !important;
        font-size: 22px !important;
        font-weight: 600 !important;
    }
    
    /* LOGIN BOX */
    .login {
        background: white !important;
        border-radius: 12px !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1) !important;
        padding: 30px !important;
        max-width: 400px !important;
        margin: 50px auto !important;
    }
    .login .form-row {
        margin-bottom: 15px !important;
    }
    .login .form-row input {
        padding: 12px !important;
        border-radius: 8px !important;
        border: 1px solid #ddd !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }
    .login .form-row input:focus {
        border-color: #1a3a5c !important;
        box-shadow: 0 0 5px rgba(26,58,92,0.2) !important;
        outline: none !important;
    }
    .login .submit-row input {
        background: #1a3a5c !important;
        border: none !important;
        padding: 12px !important;
        border-radius: 8px !important;
        font-weight: 600 !important;
        font-size: 16px !important;
        width: 100% !important;
        cursor: pointer !important;
    }
    .login .submit-row input:hover {
        background: #2d6a9f !important;
    }
    
    /* SHOW PASSWORD */
    .show-password-container {
        text-align: left;
        margin-top: 8px;
    }
    .show-password-container input[type="checkbox"] {
        width: auto !important;
        margin-right: 5px !important;
        display: inline-block !important;
    }
    .show-password-container label {
        font-size: 14px;
        color: #555;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div id="content-main">
    <form action="{{ app_path }}" method="post" id="login-form">
        {% csrf_token %}
        
        <div class="form-row">
            {{ form.username.errors }}
            <label for="id_username" style="font-weight:600; display:block; margin-bottom:5px;">Username</label>
            {{ form.username }}
        </div>
        
        <div class="form-row">
            {{ form.password.errors }}
            <label for="id_password" style="font-weight:600; display:block; margin-bottom:5px;">Password</label>
            {{ form.password }}
            
            <div class="show-password-container">
                <input type="checkbox" id="show-admin-password" onclick="toggleAdminPassword()">
                <label for="show-admin-password">Show Password</label>
            </div>
        </div>
        
        <div class="submit-row">
            <input type="submit" value="Log in">
        </div>
    </form>
</div>

<script>
    function toggleAdminPassword() {
        var x = document.getElementById("id_password");
        if (x.type === "password") {
            x.type = "text";
        } else {
            x.type = "password";
        }
    }
</script>
{% endblock %}
