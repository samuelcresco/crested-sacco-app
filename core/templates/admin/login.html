
{% extends "admin/login.html" %}

{% block extrahead %}
{{ block.super }}
<style>
    /* HIDE THE MESSY THEME TOGGLES (THE "BLACK THINGS") */
    #header .theme-toggle {
        display: none !important;
    }
    .theme-toggle {
        display: none !important;
    }
    /* CLEAN UP THE LAYOUT */
    #header {
        background: #1a3a5c !important;
        color: white !important;
        padding: 15px 20px !important;
    }
    #header h1 {
        color: white !important;
        font-size: 22px !important;
    }
    .login .submit-row input {
        background: #1a3a5c !important;
        border-radius: 8px !important;
        padding: 10px 25px !important;
        font-weight: bold !important;
    }
    .login .submit-row input:hover {
        background: #2d6a9f !important;
    }
    .form-row {
        margin-bottom: 15px !important;
    }
    .show-password-container {
        text-align: left;
        margin-top: 8px;
        margin-bottom: 10px;
    }
    .show-password-container input[type="checkbox"] {
        width: auto;
        margin-right: 5px;
        display: inline-block;
    }
    .show-password-container label {
        font-size: 14px;
        color: #555;
        cursor: pointer;
        display: inline-block;
    }
    .login .form-row input {
        padding: 12px !important;
        border-radius: 8px !important;
        border: 1px solid #ddd !important;
    }
    .login .form-row input:focus {
        border-color: #1a3a5c !important;
        box-shadow: 0 0 5px rgba(26,58,92,0.3) !important;
    }
</style>
{% endblock %}

{% block content %}
<div id="content-main">
    <form action="{{ app_path }}" method="post" id="login-form">
        {% csrf_token %}
        
        <div class="form-row">
            {{ form.username.errors }}
            <label for="id_username" style="font-weight:600;">Username</label>
            {{ form.username }}
        </div>
        
        <div class="form-row">
            {{ form.password.errors }}
            <label for="id_password" style="font-weight:600;">Password</label>
            {{ form.password }}
            
            <!-- SHOW PASSWORD TOGGLE -->
            <div class="show-password-container">
                <input type="checkbox" id="show-admin-password" onclick="toggleAdminPassword()">
                <label for="show-admin-password">Show Password</label>
            </div>
        </div>
        
        <div class="submit-row">
            <input type="submit" value="Log in">
        </div>
    </form>
</div>

<script>
    function toggleAdminPassword() {
        var x = document.getElementById("id_password");
        if (x.type === "password") {
            x.type = "text";
        } else {
            x.type = "password";
        }
    }
</script>
{% endblock %}
