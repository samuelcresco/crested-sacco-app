<!DOCTYPE html>
<html>
<head>
    <title>Crested SS 2005 Class - Member Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }
        .login-box h1 {
            color: #1a3a5c;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .login-box .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #1a3a5c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .login-box button:hover {
            background: #2d6a9f;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .links {
            margin-top: 15px;
            font-size: 14px;
        }
        .links a {
            color: #1a3a5c;
            text-decoration: none;
            font-weight: bold;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🏦</div>
        <h1>Crested SS 2005 Class</h1>
        <p class="subtitle">Member Savings Portal</p>
        
        {% if form.errors %}
            <p class="error">Invalid username or password. Please try again.</p>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        
        <div class="links">
            <p><a href="{% url 'register' %}">Create an Account (Sign Up)</a></p>
            <p><a href="{% url 'password_reset' %}">Forgot Password?</a></p>
        </div>
    </div>
</body>
</html>
